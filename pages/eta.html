<div style="display: flex; align-items: center; background: var(--md-sys-color-surface-container-high); padding: 0 0 0 16px; border: none; border-top: 1px solid var(--md-sys-color-outline-variant); box-sizing: border-box; height: 52px; width: 100%; overflow: hidden;">
    
    <div style="display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; height: 100%;">
<select id="station_select" 
        onchange="window.selectStation(this.value)"
        style="font-weight: 900; color: var(--md-sys-color-primary); font-size: 15px; background: transparent; border: none; outline: none; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px; padding: 0; appearance: none; -webkit-appearance: none;">
    <option value="" disabled selected>載入中</option>
</select>

        <span class="material-symbols-rounded" style="color: var(--md-sys-color-on-surface-variant); font-size: 20px; flex-shrink: 0;">search</span>
        
        <input type="number" id="station_id_input" placeholder="編號" value="1" 
               onblur="window.updateStationName(this.value)"
               onkeydown="if(event.key==='Enter'){this.blur(); window.refreshETADATA();}"
               style="background: transparent; border: none; width: 100%; height: 100%; outline: none; color: var(--md-sys-color-on-surface); font-weight: 500; font-size: 16px; margin: 0; padding: 0;">
    </div>
    
    <button onclick="window.refreshETADATA()" 
            style="background: none; border: none; width: 56px; height: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--md-sys-color-primary); outline: none; transition: background 0.2s; margin: 0; padding: 0; border-radius: 0;" 
            onmouseover="this.style.background='rgba(0,0,0,0.05)'" 
            onmouseout="this.style.background='none'">
        <span class="material-symbols-rounded" style="font-size: 26px;">arrow_circle_right</span>
    </button>
</div>

<div id="text">
    <div style="text-align:center; padding:40px; opacity:0.5;">載入中...</div>
</div>

<style>
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
</style>
