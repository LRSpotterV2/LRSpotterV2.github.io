<div class="filter-group">
    <div class="chip">所有路綫</div>
    <div class="chip">我的最愛</div>
    <div class="chip">當日營運</div>
</div>
<div style="display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px;">
    <div id="sortLabel" style="font-size: 12px; color: var(--md-sys-color-outline); font-weight: 500;">

    </div>
    <button id="sortToggleBtn" style="background: none; border: 1px solid var(--md-sys-color-outline-variant); border-radius: 8px; padding: 4px 12px; font-size: 12px; color: var(--md-sys-color-primary); display: flex; align-items: center; gap: 4px; cursor: pointer;">
        <span class="material-symbols-rounded" style="font-size: 16px;">swap_vert</span>

</div>

        <span class="material-symbols-rounded">search</span>

    </div>
</div>

<div id="liveList">
    <div style="text-align: center; padding: 40px; color: var(--md-sys-color-outline);">
