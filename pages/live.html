<div style="display: flex; align-items: center; justify-content: space-between; background: var(--md-sys-color-surface); height: 52px; width: 100%; box-sizing: border-box; padding: 0 8px;">
    
    <button class="chip" title="所有路綫" style="background: none; border: none; border-radius: 12px; height: 40px; width: 40px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; flex-shrink: 0; padding: 0;">
        <span class="material-symbols-rounded" style="font-size: 24px;">apps</span>
    </button>
    
    <button class="chip" title="我的最愛" style="background: none; border: none; border-radius: 12px; height: 40px; width: 40px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; flex-shrink: 0; padding: 0;">
        <span class="material-symbols-rounded" style="font-size: 24px;">bookmark</span>
    </button>

    <button class="chip" title="今期閃卡" style="background: none; border: none; border-radius: 12px; height: 40px; width: 40px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; flex-shrink: 0; padding: 0;">
        <span class="material-symbols-rounded" style="font-size: 24px;">auto_awesome</span>
    </button>

<button class="chip" title="歷史紀錄" id="datePickerChip" style="background: none; border: none; border-radius: 12px; height: 40px; width: 40px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; flex-shrink: 0; position: relative; padding: 0; overflow: hidden;">
    <span class="material-symbols-rounded" style="font-size: 24px;">calendar_today</span>
    <input type="date" id="hiddenDatePicker" style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0; z-index: 2; margin: 0; padding: 0; border: none; -webkit-appearance: none;">
</button>

    <button id="sortOrderBtn" style="background: none; border: none; border-radius: 12px; height: 40px; width: 40px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; flex-shrink: 0; padding: 0;">
        <span class="material-symbols-rounded" id="sortOrderIcon" style="font-size: 24px;">south</span>
    </button>
    
    <button id="sortToggleBtn" style="background: none; border: none; border-radius: 12px; height: 40px; padding: 0 8px; color: var(--md-sys-color-primary); cursor: pointer; display: flex; align-items: center; gap: 4px; outline: none; flex-shrink: 0;">
        <span class="material-symbols-rounded" style="font-size: 22px;">swap_vert</span>
        <span id="btnSortText" style="font-size: 13px; font-weight: 600; white-space: nowrap;">報告時間</span>
    </button>
</div>

<div class="spotting-card" style="padding: 12px 16px; border-left: none;">
    <div style="display:flex; align-items:center; gap:10px;">
        <span class="material-symbols-rounded">search</span>
        <input type="text" id="searchComp" placeholder="搜尋車編..." style="border:none; background:none; outline:none; flex:1; font-size:16px;">
    </div>
</div>

<div id="liveList">
</div>
